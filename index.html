  html{scroll-behavior:smooth}body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;font-size:14px;line-height:1.5}
  .header{background:linear-gradient(135deg,#142034 0%,#1C2C48 100%);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}

  .header-title-sub{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
  .header-title-main{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.3px}
  .header-badge{background:rgba(32,125,233,0.12);border:1px solid rgba(32,125,233,0.25);border-radius:9999px;padding:4px 14px;font-size:11px;color:var(--blue2);font-weight:700;white-space:nowrap}
  .last-updated{font-size:10px;color:var(--dim);margin-top:2px}
  .main{padding:20px 28px 0;max-width:1400px}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px}
  .kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;transition:border-color 0.2s}.kpi-card:hover{border-color:var(--blue)}
  .kpi-val{font-size:22px;font-weight:800;line-height:1;margin-bottom:5px}.kpi-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px}
  .progress-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 20px;margin-bottom:16px}
  .progress-header{display:flex;justify-content:space-between;margin-bottom:7px;align-items:center}
  .progress-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px}.progress-pct{font-size:14px;font-weight:700;color:var(--text)}

  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 16px;margin-bottom:16px}
  .filters input,.filters select{background:var(--bg);border:1px solid var(--border);border-radius:9999px;padding:6px 14px;color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:border-color 0.2s}

  .filter-divider{width:1px;height:20px;background:var(--border);margin:0 2px;flex-shrink:0}
  .hide-done-btn{display:inline-flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--border);border-radius:9999px;padding:6px 14px;color:var(--muted);font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;transition:border-color 0.2s,color 0.2s,background 0.2s;white-space:nowrap;user-select:none}

  .epic-mini-fill{height:100%;border-radius:9999px;transition:width 0.3s}.epic-count{font-size:11px;font-weight:700;min-width:34px;text-align:right}

  .issue-row:last-child{border-bottom:none}.issue-row:hover{background:rgba(32,125,233,0.04)}.issue-row.alt{background:rgba(255,255,255,0.013)}.issue-row.alt:hover{background:rgba(32,125,233,0.04)}
  .issue-type-icon{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:3px;font-size:10px;font-weight:800;margin-top:1px;flex-shrink:0}
  .issue-key{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--blue);text-decoration:none;transition:color 0.15s}.issue-key:hover{color:var(--blue2);text-decoration:underline}
  .issue-summary{font-size:12px;color:var(--text2);line-height:1.4}.issue-parent{font-size:11px;color:var(--dim);margin-top:2px;font-style:italic}
  .status-badge{display:inline-flex;align-items:center;gap:4px;border-radius:9999px;font-size:10px;font-weight:700;padding:2px 8px;white-space:nowrap;border:1px solid transparent}
  .status-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}.priority-cell{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600}
  .priority-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.assignee-cell{font-size:11px}.est-cell{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
  .no-results{text-align:center;padding:48px;color:var(--dim);font-size:14px}
  @media(max-width:1000px){.col-headers,.issue-row{grid-template-columns:20px 82px 1fr 128px 128px 48px}.col-headers span:nth-child(5),.issue-row>*:nth-child(5){display:none}}
  @media(max-width:700px){.col-headers,.issue-row{grid-template-columns:20px 72px 1fr 100px}.col-headers span:nth-child(n+5){display:none}}
</style></head>

const JIRA='https://webfx.atlassian.net/browse/';
const NOW=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
const STATUS_CFG={'Done':{color:'#41D48C',bg:'rgba(65,212,140,0.12)'},'Merged':{color:'#4DC1B9',bg:'rgba(77,193,185,0.12)'},'In Progress':{color:'#207DE9',bg:'rgba(32,125,233,0.15)'},'Under Review':{color:'#FFD12D',bg:'rgba(255,209,45,0.12)'},'Needs Edits':{color:'#F7941D',bg:'rgba(247,148,29,0.12)'},'Needs Specs':{color:'#F7941D',bg:'rgba(247,148,29,0.12)'},'Blocked':{color:'#F04D50',bg:'rgba(240,77,80,0.12)'},'To Do':{color:'#829DCE',bg:'rgba(130,157,206,0.10)'},'Backlog':{color:'#4C74B9',bg:'rgba(76,116,185,0.10)'},'Declined':{color:'#F04D50',bg:'rgba(240,77,80,0.12)'}};
const PRI_COLOR={Highest:'#F04D50',High:'#F7941D',Medium:'#FFD12D',Low:'#84B9F5',Lowest:'#6E7B81'};
const PRI_ORDER=['Highest','High','Medium','Low','Lowest'];
const TYPE_CFG={'Story':{sym:'S',color:'#207DE9'},'Sub-task':{sym:'\u21b3',color:'#4C74B9'},'Bug':{sym:'B',color:'#F04D50'},'Task':{sym:'T',color:'#9B59B6'},'Spike':{sym:'\u26a1',color:'#F7941D'}};
const EPIC_ORDER=[...new Set(ISSUES.map(i=>i.group))];
const isDone=s=>['Done','Merged','Declined'].includes(s);
const isFlight=s=>['In Progress','Under Review','Needs Edits','Needs Specs'].includes(s);
let hideDone=false;const expanded={};EPIC_ORDER.forEach(e=>expanded[e]=true);
document.getElementById('lastUpdated').textContent='Last refreshed '+NOW;
const totDone=ISSUES.filter(i=>isDone(i.status)).length,totFlight=ISSUES.filter(i=>isFlight(i.status)).length,totEst=ISSUES.reduce((s,i)=>s+(i.est||0),0),totUn=ISSUES.filter(i=>!i.assignee).length;
document.getElementById('kpiGrid').innerHTML=[['Total Issues',ISSUES.length,'#84B9F5'],['Done / Merged',totDone,'#41D48C'],['In Flight',totFlight,'#207DE9'],['Est. Hours',totEst+'h','#FFD12D'],['Unassigned',totUn,'#F7941D'],['Epics',EPIC_ORDER.length,'#92278F']].map(([l,v,c])=>'<div class="kpi-card"><div class="kpi-val" style="color:'+c+'">'+v+'</div><div class="kpi-label">'+l+'</div></div>').join('');
const pD=Math.round(totDone/ISSUES.length*100),pF=Math.round(totFlight/ISSUES.length*100);

const allSt=['All Statuses',...new Set(ISSUES.map(i=>i.status))],allPr=['All Priorities',...PRI_ORDER.filter(p=>ISSUES.some(i=>i.priority===p))],allAs=['All Assignees',...new Set(ISSUES.map(i=>i.assignee||'Unassigned'))];
document.getElementById('statusFilter').innerHTML=allSt.map((s,x)=>'<option value="'+(x===0?'All':s)+'">'+s+'</option>').join('');

function getFiltered(){const q=document.getElementById('searchInput').value.toLowerCase(),fs=document.getElementById('statusFilter').value,fp=document.getElementById('priorityFilter').value,fa=document.getElementById('assigneeFilter').value;return ISSUES.filter(i=>{if(hideDone&&isDone(i.status))return false;if(fs!=='All'&&i.status!==fs)return false;if(fp!=='All'&&i.priority!==fp)return false;if(fa!=='All'&&(i.assignee||'Unassigned')!==fa)return false;if(q&&!i.summary.toLowerCase().includes(q)&&!i.key.toLowerCase().includes(q)&&!i.group.toLowerCase().includes(q))return false;return true;});}
function statusBadge(s){const c=STATUS_CFG[s]||STATUS_CFG['To Do'];return '<span class="status-badge" style="background:'+c.bg+';color:'+c.color+';border-color:'+c.color+'44"><span class="status-dot" style="background:'+c.color+'"></span>'+s+'</span>';}
function renderIssueRow(issue,idx){const tc=TYPE_CFG[issue.type]||TYPE_CFG['Story'],pc=PRI_COLOR[issue.priority]||'#829DCE';return '<div class="issue-row'+(idx%2===1?' alt':'')+'"><span class="issue-type-icon" title="'+issue.type+'" style="background:'+tc.color+'22;color:'+tc.color+'">'+tc.sym+'</span><a class="issue-key" href="'+JIRA+issue.key+'" target="_blank" rel="noopener">'+issue.key+'</a><div><div class="issue-summary">'+issue.summary+'</div>'+(issue.parentStory?'<div class="issue-parent">\u21b3 '+issue.parentStory+'</div>':'')+'</div>'+statusBadge(issue.status)+'<div class="priority-cell"><span class="priority-dot" style="background:'+pc+'"></span><span style="color:'+pc+'">'+issue.priority+'</span></div><div class="assignee-cell" style="color:'+(issue.assignee?'var(--text3)':'var(--dim)')+';font-style:'+(issue.assignee?'normal':'italic')+'">'+(issue.assignee||'Unassigned')+'</div><div class="est-cell">'+(issue.est!=null?issue.est+'h':'\u2014')+'</div></div>';}
function renderGroups(){const filtered=getFiltered(),grouped={};filtered.forEach(i=>{(grouped[i.group]=grouped[i.group]||[]).push(i);});document.getElementById('filterCount').textContent=(ISSUES.length-filtered.length)>0?filtered.length+' of '+ISSUES.length+' issues':ISSUES.length+' issues';const c=document.getElementById('groupsContainer');if(!filtered.length){c.innerHTML='<div class="no-results">No issues match your filters.</div>';return;}c.innerHTML=EPIC_ORDER.filter(e=>grouped[e]).map(en=>{const it=grouped[en],ea=ISSUES.filter(i=>i.group===en),ed=ea.filter(i=>isDone(i.status)).length,pt=ea.length?Math.round(ed/ea.length*100):0,op=expanded[en]!==false,bc=pt===100?'#41D48C':'#207DE9',sn=en.replace(/\\/g,'\\\\').replace(/'/g,"\\'");return '<div class="epic-group"><div class="epic-header'+(op?'':' collapsed')+'" onclick="toggleGroup(\''+sn+'\')"><span class="epic-chevron'+(op?' open':'')+'">&#9654;</span><span class="epic-name">'+en+'</span><div class="epic-progress-wrap"><div class="epic-mini-bar"><div class="epic-mini-fill" style="width:'+pt+'%;background:'+bc+'"></div></div><span class="epic-count" style="color:'+(pt===100?'#41D48C':'var(--muted)')+'">'+ed+'/'+ea.length+'</span></div></div>'+(op?'<div><div class="col-headers"><span></span><span>Key</span><span>Summary</span><span>Status</span><span>Priority</span><span>Assignee</span><span>Est.</span></div>'+it.map((iss,idx)=>renderIssueRow(iss,idx)).join('')+'</div>':'')+'</div>';}).join('');}
function toggleGroup(name){expanded[name]=!(expanded[name]!==false);renderGroups();}
function toggleHideDone(){hideDone=!hideDone;const b=document.getElementById('hideDoneBtn');b.classList.toggle('active',hideDone);b.innerHTML='<span class="toggle-dot"></span>'+(hideDone?'Show Done':'Hide Done');renderGroups();}
