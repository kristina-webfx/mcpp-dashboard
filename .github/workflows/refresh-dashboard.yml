name: Refresh MCPP Dashboard

on:
  schedule:
    # 8 AM ET = 12:00 UTC (EST) / 13:00 UTC (EDT)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Debug secrets
        run: |
          if [ -z "$JIRA_EMAIL" ]; then echo "JIRA_EMAIL is EMPTY"; else echo "JIRA_EMAIL is SET"; fi
          if [ -z "$JIRA_API_TOKEN" ]; then echo "JIRA_API_TOKEN is EMPTY"; else echo "JIRA_API_TOKEN is SET"; fi
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Generate dashboard
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: python generate_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-refresh dashboard $(date +'%Y-%m-%d %H:%M UTC')"
          git push
